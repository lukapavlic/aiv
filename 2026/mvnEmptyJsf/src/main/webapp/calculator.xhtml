<!DOCTYPE html>
<html
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
	
	<h:head>
		<meta charset="UTF-8" />
		<title>Sample</title>
	</h:head>
	
	<h:body>

		<f:view>
			<h:form>
				<h:messages /><br/>
				First number:
				<h:inputText value="#{calc.firstNumber}">
						<f:validateLongRange minimum="500" />
				</h:inputText><br/>
				Second number: <h:inputText value="#{calc.secondNumber}" /> <br/>
				Result: <h:outputText value="#{calc.result}" style="color: red" /><br/>
				<h:commandButton value="Add" actionListener="#{calc.add()}" action="#{calc.whereToGo()}" />
			</h:form>

		</f:view>

	</h:body>
	
</html>
